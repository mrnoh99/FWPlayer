name: FWPlayer
options:
  bundleIdPrefix: com.fwplayer
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  # Pure-Swift SMB2/3 client used for direct in-app connection to SMB shares.
  # If this dependency is removed, the app still builds; the SMB feature is
  # compiled out via `#if canImport(SMBClient)` and reports as unavailable.
  SMBClient:
    url: https://github.com/kishikawakatsumi/SMBClient
    from: 0.3.1

  # OPTIONAL — third-party decoders for formats Core Audio can't play natively
  # (Ogg Vorbis / Opus). The decoder in Sources/Audio/OggAudioDecoder.swift is
  # compiled in only when the C library modules `CVorbis` and/or `COpus` are
  # available (`#if canImport(...)`), so the app builds fine without them.
  #
  # To enable Ogg/Opus playback, add a SwiftPM package that vends those modules
  # (libvorbisfile / libopusfile from Xiph) and list it under the FWPlayer
  # target's `dependencies`. The package must expose system-library targets named
  # `CVorbis` (headers <vorbis/vorbisfile.h>) and `COpus` (<opus/opusfile.h>).

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  FWPlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    dependencies:
      - package: SMBClient
    entitlements:
      path: Support/FWPlayer.entitlements
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: FWPlayer
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSLocalNetworkUsageDescription: "FWPlayer connects to SMB shares and advertises itself on your local network so FWPlayer Remote can control playback."
        NSBonjourServices:
          - _fwplayer._tcp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fwplayer.app
        PRODUCT_NAME: FWPlayer
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Mac Catalyst: build a native Mac desktop app from the same target
        # that ships to iPhone and iPad.
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  FWPlayer:
    build:
      targets:
        FWPlayer: all
    run:
      config: Debug
